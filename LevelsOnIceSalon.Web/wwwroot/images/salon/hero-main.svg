<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" role="img" aria-labelledby="title desc">
  <title id="title">Levels On Ice Salon hero placeholder</title>
  <desc id="desc">Soft luxury gradient placeholder for salon photography.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f3dfdc"/>
      <stop offset="55%" stop-color="#d7a7a5"/>
      <stop offset="100%" stop-color="#6f3943"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff9f8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff9f8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg)"/>
  <circle cx="290" cy="290" r="250" fill="url(#glow)"/>
  <circle cx="940" cy="400" r="180" fill="#ffffff" fill-opacity="0.16"/>
  <circle cx="840" cy="1200" r="300" fill="#ffffff" fill-opacity="0.08"/>
  <rect x="130" y="180" width="940" height="1240" rx="72" fill="#ffffff" fill-opacity="0.13" stroke="#ffffff" stroke-opacity="0.28"/>
</svg>
